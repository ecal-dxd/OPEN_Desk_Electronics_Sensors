<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gyroscope</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #eee;
      font-family: "SF Mono", "Fira Code", monospace;
      overflow: hidden;
    }

    canvas { display: block; }

    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 13px;
      line-height: 1.6;
      opacity: 0.7;
      pointer-events: none;
      z-index: 10;
    }

    #hud .label { color: #888; }
    #hud .val   { color: #0f0; font-weight: bold; }

    #status {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 12px;
      z-index: 10;
    }

    #status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    #status .dot.off  { background: #f44; }
    #status .dot.on   { background: #4f4; }
  </style>
</head>
<body>
  <div id="hud">
    <div><span class="label">gyro X </span><span class="val" id="vx">—</span></div>
    <div><span class="label">gyro Y </span><span class="val" id="vy">—</span></div>
    <div><span class="label">gyro Z </span><span class="val" id="vz">—</span></div>
  </div>

  <div id="status">
    <span class="dot off" id="dot"></span>
    <span id="statusText">Waiting for OSC…</span>
  </div>

  <script type="module" src="/src/app.js"></script>
</body>
</html>
